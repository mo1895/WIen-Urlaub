<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urlaub 2026 – München &amp; Wien</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─ TOKENS ───────────────────────────────────────────── */
:root{
  --red:#a83232; --red-h:#8a2020; --red-dim:rgba(168,50,50,.11); --red-light:#f5e8e8;
  --blue:#1e5fa0; --blue-h:#164a82; --blue-light:#e5eef8;
  --green:#1a6b5e; --green-h:#125248; --green-light:#e4f2ef;
  --bg:#faf8f4; --surface:#ffffff; --surface2:#f7f4f0; --surface3:#f2ede7;
  --border:rgba(30,20,10,.09); --divider:rgba(30,20,10,.06);
  --ink:#1a1510; --ink-mid:#5c5248; --ink-soft:#9e9288; --ink-faint:#cec8c0;
  --font-serif:'Playfair Display',Georgia,serif;
  --font-sans:'DM Sans',system-ui,sans-serif;
  --r-sm:8px; --r-md:14px; --r-lg:20px; --r-xl:28px; --r-full:9999px;
  --sh-sm:0 1px 4px rgba(26,21,16,.07),0 2px 8px rgba(26,21,16,.04);
  --sh-md:0 4px 20px rgba(26,21,16,.1),0 1px 4px rgba(26,21,16,.05);
  --sh-lg:0 12px 48px rgba(26,21,16,.13),0 3px 10px rgba(26,21,16,.06);
  --ease:cubic-bezier(.16,1,.3,1); --dur:220ms;
}
[data-theme="dark"]{
  --bg:#141110; --surface:#1d1917; --surface2:#231f1d; --surface3:#2a2420;
  --border:rgba(255,240,220,.08); --divider:rgba(255,240,220,.05);
  --ink:#e8e0d8; --ink-mid:#948880; --ink-soft:#5e5650; --ink-faint:#3a3530;
  --red:#d95050; --red-h:#c03838; --red-dim:rgba(217,80,80,.12); --red-light:rgba(217,80,80,.14);
  --blue:#5090cc; --blue-h:#3a78b8; --blue-light:rgba(80,144,204,.13);
  --green:#3ea890; --green-h:#2d9080; --green-light:rgba(62,168,144,.13);
  --sh-sm:0 1px 4px rgba(0,0,0,.3); --sh-md:0 4px 20px rgba(0,0,0,.38); --sh-lg:0 12px 48px rgba(0,0,0,.48);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){--bg:#141110;--surface:#1d1917;--surface2:#231f1d;--surface3:#2a2420;--border:rgba(255,240,220,.08);--divider:rgba(255,240,220,.05);--ink:#e8e0d8;--ink-mid:#948880;--ink-soft:#5e5650;--red:#d95050;--red-h:#c03838;--red-dim:rgba(217,80,80,.12);--red-light:rgba(217,80,80,.14);--blue:#5090cc;--blue-h:#3a78b8;--blue-light:rgba(80,144,204,.13);--green:#3ea890;--green-h:#2d9080;--green-light:rgba(62,168,144,.13);}}

/* ─ RESET ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
body{font-family:var(--font-sans);font-size:clamp(14.5px,1.5vw,16.5px);color:var(--ink);background:var(--bg);min-height:100dvh;line-height:1.65;transition:background .3s,color .3s;}
h1,h2,h3,h4{font-family:var(--font-serif);line-height:1.2;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ─ HEADER ─────────────────────────────────────────────── */
header{position:sticky;top:0;z-index:300;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--sh-sm);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,4vw,40px);height:62px;}
.hd-logo{display:flex;align-items:center;gap:12px;}
.hd-logo-icon{width:38px;height:38px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform var(--dur) var(--ease);}
.hd-logo-icon:hover{transform:rotate(-8deg) scale(1.08);}
.hd-logo-icon svg{color:#fff;}
.hd-name{font-family:var(--font-serif);font-size:1.1rem;line-height:1;}
.hd-sub{font-size:.7rem;color:var(--ink-soft);letter-spacing:.03em;margin-top:2px;}
.hd-actions{display:flex;gap:6px;}
.icon-btn{width:36px;height:36px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;color:var(--ink-mid);transition:background var(--dur) var(--ease),color var(--dur) var(--ease);}
.icon-btn:hover{background:var(--surface2);color:var(--ink);}

/* ─ TAB BAR ────────────────────────────────────────────── */
.tab-bar{position:sticky;top:62px;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:center;padding:0 clamp(12px,3vw,32px);gap:2px;overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-item{position:relative;display:flex;align-items:center;gap:8px;padding:0 18px;height:50px;font-size:.85rem;font-weight:500;color:var(--ink-mid);white-space:nowrap;flex-shrink:0;transition:color var(--dur) var(--ease);border:none;background:none;cursor:pointer;}
.tab-item::after{content:'';position:absolute;bottom:0;left:12px;right:12px;height:2.5px;border-radius:2px 2px 0 0;background:var(--tab-color,var(--red));transform:scaleX(0);transition:transform .3s var(--ease);}
.tab-item.active{color:var(--ink);}
.tab-item.active::after{transform:scaleX(1);}
.tab-item:hover{color:var(--ink);}
.tab-icon{font-size:1.05rem;}

/* ─ TAB TRANSITIONS ──────────────────────────────────────── */
.tab-viewport{position:relative;overflow:hidden;}
.tab-section{display:none;opacity:0;transform:translateY(12px);transition:none;}
.tab-section.active{display:block;}
.tab-section.entering{animation:tabEnter .35s var(--ease) forwards;}
.tab-section.leaving{animation:tabLeave .22s var(--ease) forwards;}
@keyframes tabEnter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes tabLeave{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-8px)}}

/* ─ HERO ───────────────────────────────────────────────── */
.hero{position:relative;overflow:hidden;padding:clamp(44px,7vw,88px) clamp(16px,5vw,48px) clamp(36px,5vw,64px);display:flex;flex-direction:column;align-items:center;text-align:center;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 50% -5%,var(--hero-glow,rgba(168,50,50,.11)),transparent 68%);pointer-events:none;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:7px;padding:5px 16px;border-radius:var(--r-full);font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:var(--hero-pill-bg,var(--red-dim));color:var(--hero-pill-col,var(--red));margin-bottom:18px;}
.hero h1{font-size:clamp(2rem,4.5vw,3.5rem);font-style:italic;margin-bottom:10px;}
.hero h1 span{font-style:normal;}
.hero-sub{font-size:.98rem;color:var(--ink-mid);margin-bottom:24px;}
.hero-badge{display:inline-flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 20px;font-size:.85rem;box-shadow:var(--sh-sm);}
.hb-dot{width:8px;height:8px;border-radius:50%;background:var(--hero-accent,var(--red));flex-shrink:0;}

/* ─ STAT STRIP ──────────────────────────────────────────── */
.stat-strip{background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:center;flex-wrap:wrap;}
.ssi{padding:18px 28px;text-align:center;border-right:1px solid var(--border);}
.ssi:last-child{border-right:none;}
.ssv{font-family:var(--font-serif);font-size:1.6rem;line-height:1;color:var(--stat-col,var(--red));font-weight:600;}
.ssl{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);margin-top:4px;}

/* ─ CONTENT ────────────────────────────────────────────── */
.wrap{max-width:900px;margin:0 auto;padding:clamp(28px,4vw,56px) clamp(16px,4vw,28px);}

/* ─ DAY HEADER ─────────────────────────────────────────── */
.day-block{margin-bottom:48px;}
.day-hd{display:flex;align-items:center;gap:18px;margin-bottom:20px;}
.day-loz{flex-shrink:0;width:56px;height:56px;border-radius:16px;background:var(--loz-bg,var(--red));color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 14px var(--loz-sh,rgba(168,50,50,.32));}
.loz-n{font-family:var(--font-serif);font-size:1.45rem;line-height:1;font-weight:700;}
.loz-l{font-size:.58rem;text-transform:uppercase;letter-spacing:.12em;opacity:.8;margin-top:1px;}
.day-title{font-family:var(--font-serif);font-size:clamp(1.15rem,2.2vw,1.6rem);}
.day-sub{font-size:.82rem;color:var(--ink-mid);margin-top:3px;}

/* ─ EXPANDABLE CARDS ─────────────────────────────────────── */
.cards{display:grid;gap:14px;}
.xcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow:hidden;transition:box-shadow var(--dur) var(--ease),transform var(--dur) var(--ease);}
.xcard:hover{box-shadow:var(--sh-md);transform:translateY(-2px);}
.xcard-head{display:grid;grid-template-columns:48px 1fr auto;gap:0 16px;align-items:center;padding:18px 20px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.xcard-head:focus-visible{outline:2px solid var(--card-accent,var(--red));outline-offset:-2px;}
.xcard-em{width:48px;height:48px;border-radius:var(--r-sm);background:var(--card-em-bg,var(--red-light));display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;transition:transform var(--dur) var(--ease);}
.xcard:hover .xcard-em{transform:scale(1.06);}
.xcard-main{min-width:0;}
.xcard-name{font-family:var(--font-serif);font-size:1.05rem;margin-bottom:3px;}
.xcard-hint{font-size:.76rem;color:var(--ink-mid);}
